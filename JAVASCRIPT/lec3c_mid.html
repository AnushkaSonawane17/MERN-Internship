<body>
    <h1>Print mid</h1>
    <script>
        var a=Number(prompt("Enter a number:"));
        var b=Number(prompt("Enter the second number:"));
        var c=Number(prompt("Enter third number:"));

        console.log((a>b && a<c)||(a<b && a>c)? a:(b>a && b<c)||(b<a && b>c)? b:c);
    </script>
