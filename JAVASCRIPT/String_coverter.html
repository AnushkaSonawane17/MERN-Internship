<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Text Converter</h1>
    <textarea name="" id="content" rows="15" cols="70"></textarea>
    <br><br>
    <button onclick="convertUpperCase()">UPPERCASE</button>
    <button onclick="convertLowercase()">lowercase</button>
    <button onclick="count()">Count Words</button>
    <script>
        let count1=0;
        let text=document.getElementById("content");
        function convertUpperCase(){
            text.value=text.value.toUpperCase();
        }
        function convertLowercase(){
            text.value=text.value.toLowerCase();
        }
        function count(){
            let arr=text.value.split(" ");
            for(i=0;i<=arr.length;i++){
                count1++;
            }
            text.value=count1;
            //text.value=text.value.split(" ").length;
        }
    </script>
</body>
</html>
