<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            text-align: center;
        }
        .box{
            height: 100px;
            width: 100px;
            border: 1px solid;
            border-radius: 50%;
            margin-left: 700px;
        }
        #red{
            margin-top: 150px;
        }
    </style>
</head>
<body>
    <h1>Traffic Signal</h1>
    <div class="box" id="red" onmouseover="getRed()" onmouseout="throwRed()"></div>
    <div class="box" id="yellow" ondblclick="getYellow()" onmouseout="throwYellow()"></div>
    <div class="box" id="green" onmousedown="getGreen()" onmouseup="throwGreen()"></div>
    <script>
        let red=document.getElementById("red");
        let yellow=document.getElementById("yellow");
        let green=document.getElementById("green")
        function getRed(){
            red.style.backgroundColor= "red";
        }
        function throwRed(){
            red.style.backgroundColor="white";
        }
        function getYellow(){
            yellow.style.backgroundColor="yellow";
        }
        function throwYellow(){
            yellow.style.backgroundColor="white";
        }
        function getGreen(){
            green.style.backgroundColor="green";
        }
        function throwGreen(){
            green.style.backgroundColor="white";
        }

    </script>
</body>
</html>
