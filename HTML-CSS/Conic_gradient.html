<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #circle{
            height: 500px;
            width: 500px;
            border: 2px solid black;
            border-radius: 50%;
            background-image: conic-gradient(
             red 0deg, red 45deg,
             green 45deg,green 90deg,
             blue 90deg, blue 135deg,
             orange 135deg,orange 180deg,
             yellow 180deg, yellow 225deg,
             black 225deg, black 270deg,
             pink 270deg,pink 315deg, 
             aqua 315deg, aqua 360deg
             );
        }
    </style>
</head>
<body>
    <center><div id="circle"></div></center>
</body>
</html>
