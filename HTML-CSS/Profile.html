<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #main{
        height: 600px;
        width: 1350px;
        background-color: #D6EAF3;
        border:2px solid #D6EAF3;
        border-radius: 10px;
        margin:30px 0px 0px 50px;
        padding: 30px;
    }
    #profile{
        height: 200px;
        width: 200px;
        border: 6px solid white;
        border-radius: 100%;
        display: inline-block;
        margin: 25px 0px 0px 25px;
    }
    #img{
        height: 200px;
        width: 200px;
        border-radius: 100%;
        display: inline-block;
    }
    h2{
        display:inline-block;
        padding: 10px;
    }
    h1{
        display:inline-block;
        margin-bottom: 5px;
    }
    button{
        height: 50px;
        width: 200px;
        border-radius: 5px;
        font-size: larger;
    }
    #follow{
        background-color: black;
        color:white;
    }
    #content{
        width:1000px;
        font-size: larger;
        display: inline-block;
        vertical-align: top;
        margin-left: 20px;
    }
    #text{
        font-family: Arial, Helvetica, sans-serif;
    }
    #profile-d{
        height:600px;
        width: 250px;
        display: inline-block;
        vertical-align: top;
    }
    h3{
        margin-top: 0;
    }
    body{
        background-color: lightblue;
    }
    </style>
</head>
<body>
    <div id="main">
    <div id="profile-d">
    <div id="profile">
    <img src="./Profile.png" alt="" id="img">
    </div>
    </div>
    <div id="content">
    <h1><b>Anushka Sonawane</b></h1>
    <h3><b>@anushkasonawane</b></h3>
    <br><br>
    <p id="text">I'm a Front End Developer, follow me to be the first who see my new work</p>
    <br>
    <h2><b>15K<br>Views</b></h2>
    <h2><b>82<br>Projects</b></h2>
    <h2><b>1.3M<br>Followers</b></h2>
    <br>
    <button id="follow"><b>Follow</b></button>
    <button><b>View profile</b></button>
    </div>
</body>
</html>
