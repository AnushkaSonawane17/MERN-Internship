<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Showroom</title>
    <link rel="shortcut icon" href="./racing-car.png" type="image/x-icon">
    <style>
         #c{
            height: 600px;
            width: 400px;
            background-color: aliceblue;
            border: 1px solid;
            padding: 20px;
            border-radius: 20px;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: 0 10px 30px black;
            color: black;
        }
        #productContainer{
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;

        }
        #img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}
       
        #more{
            position: relative;
            bottom: 8px;
            font-weight: bold;
        }
        #searchBar{
            height: 50px;
            width: 900px;
            border-radius: 50px;
        }
        #heading{
            text-align: center;
            font-size: 100px;
        }
        button{
            height: 50px;
            width: 130px;
            border-radius: 40px;
            font-weight: 700;
            border: 4px solid black;
        }
        #buy:hover{
            background-color: black;
            color: white;
            height: 55px;
            width: 140px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1 id="heading"><u>Car Showroom</u></h1>
    <center><input type="text" name="" id="searchBar" placeholder="     Search here....."></center><br><br>
    <center><button onclick="lowToHigh()">Low-High</button>
    <button onclick="highToLow()">High-Low</button></center><br><br><br><br><br>
    <div id="productContainer"></div>
     <style>
        body{
            background-color: #000;
            color: white;
        }
    </style>
    
    <br><br><br>
    <div id="container"></div>
    <script>
        let container=document.getElementById("productContainer");
        let search=document.getElementById("searchBar");
        let cars=[{
            pname: "Koenigsegg Jesko",
            cname:"Koenigsegg Automotive AB",
            hp: "1280 bhp",
            speed: "330 mph",
            price:"₹24 Crore",
            rprice:240000000,
            img:"./Jesko.jpg",
            website:"./koenigsegg.html"
        },{
            pname: "Bugatti Chiron",
            cname:"Bugatti Automobiles S.A.S",
            hp: "1578 hp",
            speed:"260 mph",
            price:"₹19.21 Crore",
            rprice:192100000,
            img:"./Bugatti_Chiron.jpeg",
            website:"./Chiron.html"
        },{
            pname: "Bugatti Mistral",
            cname:"Bugatti Automobiles S.A.S",
            hp:"1578 hp",
            speed:"282 mph",
            price:"₹41 crore",
            rprice:410000000,
            img:"./Bugatti_Mistral.jpg",
            website:"./Mistral.html",
        },{
            pname: "YangWang U9 Xtreme",
            cname:"BYD Auto",
            hp:"2978 hp",
            speed:"308.4 mph",
            price:"₹2.36 crore",
            rprice:23600000,
            img:"./YangWang-U9-Xtreme.jpg",
            website:"./Yangwang.html",
        },{
            pname: "SSC Tuatara",
            cname:"SSC North America",
            hp:"1750 hp",
            speed:"316.11 mph",
            price:"₹35 crore",
            rprice:350000000,
            img:"./ssc_tuatara.jpg",
            website:"./Tuatara.html",
        }]
        function display(list){
            container.innerHTML=""
            //  let div=document.createElement("div");
            list.forEach((val)=>{
                 let div=document.createElement("div");
                 div.id="c"
                div.innerHTML=`<img src="${val.img}" alt="" id="img">
                             <h2><center>${val.pname}</center></h2>
                             <h3>Company name: ${val.cname}</h3>
                             <h3>Horsepower: ${val.hp}</h3>
                             <h3>Speed: ${val.speed}</h3>
                             <h3>Price: ${val.price}</h3><br>
                             <center><button id="buy">Buy now</button></center>
                             <h5><center><a href="${val.website}" id="more">More details?<br>Go to our website</a></center></h5>
                             `
                             container.appendChild(div);
            })
            // container.appendChild(div);
            
        }
        display(cars);
        search.addEventListener("input",()=>{                     //input is eventlistener  and that arrow functionn is the function which will run when we enter inout
            let searchval=search.value.toLowerCase();
            let filtered=cars.filter((pr) =>{
                return pr.pname.toLowerCase().includes(searchval);
            });
            display(filtered);
        });

        function lowToHigh(){
            let sorted=[...cars];
            sorted.sort((a,b)=>Number(a.rprice)-Number(b.rprice));
            display(sorted);
        }

        function highToLow(){
            let sorted=[...cars];
            sorted.sort((a,b)=>Number(b.rprice)-Number(a.rprice));
            display(sorted);
        }
    </script>
</body>
</html>
