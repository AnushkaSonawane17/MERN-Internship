<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #Leaf{
        height:100px;
        width:100px;
        background-color: aqua;
        border-top-right-radius: 70px;
        border-bottom-left-radius: 70px;
        }
        #HOval{
            height:80px;
            width: 200px;
            background-color: blue;
            border-bottom-right-radius: 50%;
            border-bottom-left-radius: 50%;
        }
        #oval{
            height: 140px;
            width: 300px;
            background-color: orange;
            border-radius: 50%;
        }
        #twist{
            height:150px;
            width: 300px;
            background-color: darkgreen;
            border-top-right-radius: 100%;
            border-bottom-left-radius: 100% ;
        }
        #twistt{
            height: 120px;
            width: 250px;
            background-color: purple;
            border-top-right-radius: 50%;
            border-bottom-left-radius: 50% ;
        }
        #circle{
            height: 150px;
            width: 150px;
            background-color: hotpink;
            border-radius: 100%;
        }
        #tab{
            height: 150px;
            width: 150px;
            background-color: aqua;
            border-bottom-left-radius: 100%;
            border-bottom-right-radius: 100%;
        }
        #three{
            height: 150px;
            width: 150px;
            background-color: blue;
            border-radius: 0px 100% 100% 100%;
        }
        h3{
            color: white;
            text-align: center;
            padding-top: 20px;
        }
    </style>
</head>
<body>
     <div id="Leaf">
        <h3>Leaf</h3>
    </div>
    
    <div id="HOval">
        <h3>Half Oval</h3>
    </div>
    
    <div id="oval">
        <h3>Oval</h3>
    </div>
    
    <div id="twist">
        <h3>Twist</h3>
    </div>
    
    <div id="twistt">
        <h3>Twist two</h3>
    </div>
    
    <div id="circle">
        <h3>circle</h3>
    </div>
    
    <div id="tab">
        <h3>Tab</h3>
    </div>
    
    <div id="three">
        <h3>Three Sided</h3>
    </div>
</body>
</html>
