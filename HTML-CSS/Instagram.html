<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="shortcut icon" href="./instagram.png" type="image/x-icon">
            <!-- background-image: linear-gradient(#FCAF45,#F77737,#E1306C,#C13584,#833AB4); -->
             <style>
                #main{
                    height: 700px;
                    width: 700px;
                    border-radius: 140px;
                    background-image: linear-gradient(45deg,#FCAF45,#F77737,#E1306C,#C13584,#833AB4);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
                #square{
                    height: 500px;
                    width: 500px;
                    border-radius: 140px;
                    border: 30px solid white;
                    /* margin-top: 90px;
                    margin-left: 75px; */
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    position: relative;
                }
                #circle{
                    height: 50px;
                    width: 50px;
                    border-radius: 50%;
                    background-color: white;
                    position: absolute;
                    bottom: 400px;
                    left: 400px;

                }
                #lcircle{
                    height: 260px;
                    width: 260px;
                    border-radius: 50%;
                    border: 30px solid white;
                    /* margin-top: 80px;
                    margin-left: 65px; */
                }
             </style>
</head>
<body>
   <div id="main">
    <div id="square">
     <div id="circle"></div>
      <div id="lcircle">

      </div>
    </div>
   </div>
</body>
</html>
