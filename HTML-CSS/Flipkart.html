<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipKart</title>
    <link rel="shortcut icon" href="./flipkart-icon.png" type="image/x-icon">
    <style>
        #input{
            height: 600px;
            width: 700px;
            background-color: white;
            padding: 20px;
            display: inline-block;
            box-shadow: 15px 15px 40px grey;
            
        }
        #login{
            height: 600px;
            width: 300px;
            background-color:#2874f0;
            padding: 20px;
            display: inline-block;
            box-shadow: 0px 15px 40px grey;
        }
        h1{
            font-size: 500px;
            color: #fff;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }
        #login_c{
            color: #fff;
            font-size: 50px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }
        #login_content{
            color: #fff;
            font-size: 15px;
            padding: 40px 33px;
            font-size: 20px;
        }
        #img{
            height: 200px;
            width: 250px;
            margin-bottom: 50px;
        }
        #imgr{
            height: 200px;
            width: 250px;
            margin-left: 20px;
            margin-bottom: 50px;
        }
        input{
            height: 50px;
            width: 500px;
            border: none;
            border-bottom: 1px solid rgb(4, 152, 244);
            outline: none;
            margin-left: 50px;
            margin-top: 100px;
        }
        #Terms{
            font-size: 15px;
            color: grey;
            font-family: 'Times New Roman', Times, serif;
            margin-left: 50px;
        }
        .otp{
        height: 65px;
        width: 500px;
        border: none;
        color: #fff;
        background-color:#fb641b ;
        margin-left: 50px;
        font-size: large;
        border-radius: 3px;
        }
        #Acc{
            color: dodgerblue;
            font-size: 18px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-left: 170px;
            margin-top: 50px;

        }
        #main{
            display: flex;
            flex-direction: row;
            justify-content: center;
            margin-top: 50px;
        }

    </style>
</head>
<body>
    <div id="main">
    
        <div id="login">
            <h1 id="login_c">Login</h1>
            <p id="login_content">Get access to your Orders, Wishlist and Recommendations</p>
            <div id="img"><br><br><br><br><br><br>
            <img src="./Flipkart_login.png" alt="" id="imgr">
            </div>
        </div>
        <div id="input">
        <input type="tel" name=""placeholder="Enter Your Mobile Number">
        
        <p id="Terms">By continuing, you agree to Flipkart's Terms of Use and Privacy Policy</p><br><br>
        <button class="otp">Login</button><br><br><br><br><br><br><br><br><br>
        <p id="Acc">New to Flipkart? Create an account</p>
        
    </div>
    </div>
    
</body>
</html>
